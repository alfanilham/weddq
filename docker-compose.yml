services:
  postgres:
    image: postgres:16-alpine
    container_name: weddq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: weddq
      POSTGRES_PASSWORD: weddq_secret
      POSTGRES_DB: weddq
    ports:
      - "5433:5432"
    volumes:
      - weddq_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weddq -d weddq"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    container_name: weddq_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  weddq_pgdata:
